version: 2

sources:
  - name: jaffle_shop
    description: clone of a postgress application database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: raw customer data
        columns:
          - name: id
            description: primary key for customer data
            tests:
              - unique
              - not_null
              
      - name: orders
        description: raw order data
        freshness: 
          warn_after:
            count: 1
            period: day
          error_after:
            count: 365
            period: day
        columns:
          - name: id
            tests:
              - unique
              - not_null
              
        
        